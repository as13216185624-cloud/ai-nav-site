<style>
:root {
    --bg: #000000; --card-bg: #0d0d0d; --card-hover: #1a1a1a;
    --text: #e5e5e5; --text-secondary: #888888; --accent: #6c5ce7;
    --accent-glow: rgba(108,92,231,0.25); --border: #1f1f1f; --tag-bg: #161616;
    --gradient: linear-gradient(135deg,#6c5ce7,#a29bfe);
    --free: #00b894; --paid: #fdcb6e; --vpn: #ff6b6b; --cn: #00b894;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;}
.nav-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-logo img{width:36px;height:36px;border-radius:8px;}
.nav-logo img.nav-logo-main{width:36px;height:36px;border-radius:8px;margin-right:4px;}
.nav-title-logo{height:22px;width:auto;border-radius:0!important;}
.nav-logo-text{font-size:1.05rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-link{color:var(--text-secondary);text-decoration:none;font-size:.9rem;transition:color .2s;padding:6px 0;}
.nav-link:hover,.nav-link.active{color:var(--text);}
.nav-link.active{border-bottom:2px solid var(--accent);}
.nav-badge{background:var(--accent);color:#fff;font-size:.65rem;padding:1px 6px;border-radius:8px;margin-left:4px;}

/* News Ticker */
.news-ticker{background:#000;border-bottom:1px solid var(--border);padding:10px 0;overflow:hidden;}
.ticker-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:0 20px;}
.ticker-label{flex-shrink:0;background:var(--accent);color:#fff;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:4px;white-space:nowrap;}
.ticker-track{flex:1;overflow:hidden;position:relative;height:22px;}
.ticker-list{display:flex;gap:0;position:absolute;animation:tickerScroll 60s linear infinite;}
.ticker-item{display:flex;align-items:center;gap:8px;white-space:nowrap;padding-right:40px;font-size:.82rem;color:var(--text);}
.ticker-item a{color:var(--text);text-decoration:none;transition:color .2s;}
.ticker-item a:hover{color:var(--accent);}
.ticker-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.ticker-time{color:var(--text-secondary);font-size:.7rem;margin-right:4px;}
@keyframes tickerScroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.ticker-track:hover .ticker-list{animation-play-state:paused;}
.header{background:#000;padding:40px 20px 28px;text-align:center;border-bottom:1px solid var(--border);}
.header h1{font-size:2.5rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;}
.header-title-logo{max-width:420px;width:70%;height:auto;margin-bottom:10px;}
.header p{color:var(--text-secondary);font-size:1.05rem;max-width:600px;margin:0 auto 20px;}
.stats-row{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:14px;}
.stat-item{display:flex;align-items:center;gap:6px;background:var(--card-bg);border:1px solid var(--border);padding:6px 16px;border-radius:20px;font-size:.85rem;color:var(--text-secondary);}
.stat-item span{color:var(--accent);font-weight:700;}
.legend{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-secondary);}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.legend-dot.vpn{background:var(--vpn);}
.legend-dot.cn{background:var(--cn);}

/* Controls */
.controls{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;}
.controls-inner{max-width:1300px;margin:0 auto;}
.controls-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.controls-row:last-child{margin-bottom:0;}
.search-box{flex:1;min-width:200px;position:relative;}
.search-box input{width:100%;padding:10px 14px 10px 40px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.search-box .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:1rem;}

.region-tags,.filter-tags{display:flex;gap:6px;flex-wrap:wrap;}
.region-tag,.filter-tag{padding:7px 14px;border-radius:18px;border:1px solid var(--border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;font-size:.82rem;white-space:nowrap;transition:all .2s;user-select:none;}
.region-tag:hover,.filter-tag:hover{border-color:var(--accent);color:var(--text);}
.region-tag.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.filter-tag.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.region-tag.cn{border-color:rgba(0,184,148,.4);}
.region-tag.cn.active{background:var(--cn);border-color:var(--cn);}
.region-tag.intl{border-color:rgba(255,107,107,.4);}
.region-tag.intl.active{background:var(--vpn);border-color:var(--vpn);}

/* Main */
.main{max-width:1300px;margin:0 auto;padding:28px 20px 60px;}
.category-section{margin-bottom:40px;}
.category-title{font-size:1.2rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.category-icon{font-size:1.4rem;}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;}

/* Card */
.tool-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .3s;cursor:pointer;}
.tool-card:hover{border-color:var(--accent);background:var(--card-hover);transform:translateY(-2px);box-shadow:0 8px 28px rgba(108,92,231,.12);}
.tool-preview{width:100%;height:170px;background:#050505;overflow:hidden;position:relative;}
.tool-preview img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.tool-card:hover .tool-preview img{transform:scale(1.05);}
.preview-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d0d0d,#1a1a1a);color:var(--text-secondary);font-size:2.8rem;}
.preview-badges{position:absolute;top:8px;right:8px;display:flex;gap:5px;z-index:2;}
.badge-vpn{background:rgba(255,107,107,.92);color:#fff;font-size:.68rem;padding:2px 8px;border-radius:5px;font-weight:600;}
.badge-cn{background:rgba(0,184,148,.92);color:#fff;font-size:.68rem;padding:2px 8px;border-radius:5px;font-weight:600;}
.badge-free,.badge-paid,.badge-freemium{font-size:.68rem;padding:2px 8px;border-radius:5px;font-weight:600;}
.badge-free{background:rgba(0,184,148,.9);color:#fff;}
.badge-paid{background:rgba(253,203,110,.9);color:#1a1a24;}
.badge-freemium{background:rgba(108,92,231,.9);color:#fff;}

.tool-body{padding:16px 18px 18px;}
.tool-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.tool-icon{width:38px;height:38px;border-radius:10px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.tool-name{font-size:1rem;font-weight:700;color:var(--text);}
.tool-vendor{font-size:.75rem;color:var(--text-secondary);margin-bottom:5px;}
.tool-desc{font-size:.82rem;color:var(--text-secondary);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tool-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.tool-tag{font-size:.68rem;padding:2px 8px;background:var(--tag-bg);border-radius:5px;color:var(--text-secondary);}
.tool-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border);}
.tool-rating{display:flex;align-items:center;gap:3px;font-size:.78rem;color:var(--text-secondary);}
.tool-rating .star{color:#fdcb6e;}
.tool-link{padding:6px 14px;background:var(--gradient);color:#fff;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:600;transition:all .2s;}
.tool-link:hover{transform:scale(1.05);box-shadow:0 4px 12px var(--accent-glow);}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary);}
.empty-state .icon{font-size:3rem;margin-bottom:14px;}

.footer{text-align:center;padding:36px 20px;border-top:1px solid var(--border);color:var(--text-secondary);font-size:.82rem;}
.footer a{color:var(--accent);text-decoration:none;}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-content{max-width:90vw;max-height:85vh;border-radius:14px;overflow:hidden;position:relative;}
.modal-content img{max-width:100%;max-height:85vh;object-fit:contain;}
.modal-close{position:absolute;top:8px;right:14px;color:#fff;font-size:1.4rem;cursor:pointer;background:rgba(0,0,0,.5);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;border:none;}
.modal-close:hover{background:rgba(255,255,255,.2);}

@media(max-width:768px){

.tools-grid{grid-template-columns:1fr;}
.controls-inner{flex-direction:column;}
.search-box{width:100%;}
.filter-tags{justify-content:center;}
}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>

// ============ 渲染引擎 ============
const container=document.getElementById('toolsContainer');
const searchInput=document.getElementById('searchInput');
const regionTags=document.querySelectorAll('.region-tag');
const filterTags=document.querySelectorAll('.filter-tag');
const toolCount=document.getElementById('toolCount');
const cnCount=document.getElementById('cnCount');
const intlCount=document.getElementById('intlCount');

let activeRegion='all',activeCategory='all',searchQuery='';

// ============ News Ticker ============
async function loadTicker(){
    const tickerList=document.getElementById('tickerList');
    try{
        const resp=await fetch('news.json');
        const news=await resp.json();
        const top10=news.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
        if(!top10.length){tickerList.innerHTML='<span class="ticker-item" style="color:var(--text-secondary);">暂无快讯</span>';return;}
        const items=top10.map(n=>`<span class="ticker-item"><span class="ticker-dot"></span><a href="${n.source_url}" target="_blank">${n.title}</a></span>`).join('');
        tickerList.innerHTML=items+items;
    }catch(e){
        tickerList.innerHTML='<span class="ticker-item" style="color:var(--text-secondary);">加载快讯中...</span>';
    }
}
loadTicker();

const catMap={
    llm:{name:'💬 大语言模型',icon:'💬'},
    image:{name:'🎨 图片生成',icon:'🎨'},
    video:{name:'🎬 视频生成',icon:'🎬'},
    audio:{name:'🎵 音频音乐',icon:'🎵'},
    code:{name:'💻 编程开发',icon:'💻'},
    design:{name:'✏️ 设计创作',icon:'✏️'},
    productivity:{name:'📋 办公效率',icon:'📋'},
    avatar:{name:'🎭 数字人/虚拟人',icon:'🎭'},
    search:{name:'🔍 AI搜索',icon:'🔍'},
    edu:{name:'📚 教育学习',icon:'📚'},
    agent:{name:'🧩 Agent/自动化',icon:'🧩'},
    '3d':{name:'🏗️ 3D生成',icon:'🏗️'},
};

function getPriceBadge(pt){
    switch(pt){
        case'free':return'<span class="badge-free">免费</span>';
        case'paid':return'<span class="badge-paid">付费</span>';
        case'freemium':return'<span class="badge-freemium">免费+付费</span>';
        default:return'';
    }
}
function getStars(r){
    let s='',f=Math.floor(r/2),h=r%2>=.5?1:0;
    for(let i=0;i<f;i++)s+='<span class="star">⭐</span>';
    if(h)s+='<span class="star">✨</span>';
    return s;
}

function renderCard(t){
    const preview=t.preview?`<img src="${t.preview}" alt="${t.name}" loading="lazy" onclick="event.stopPropagation();openPreview('${t.preview}')">`:`<div class="preview-placeholder">${t.icon}</div>`;
    const vpnBadge=t.vpn?'<span class="badge-vpn">🔒 需科学上网</span>':'<span class="badge-cn">🇨🇳 国内直连</span>';
    return`
    <div class="tool-card" onclick="window.open('${t.link}','_blank')">
        <div class="tool-preview">${preview}<div class="preview-badges">${vpnBadge}${getPriceBadge(t.pt)}</div></div>
        <div class="tool-body">
            <div class="tool-card-header"><div class="tool-icon">${t.icon}</div></div>
            <div class="tool-name">${t.name}</div>
            <div class="tool-vendor">${t.vendor}</div>
            <div class="tool-desc">${t.desc}</div>
            <div class="tool-tags">${t.tags.map(tg=>`<span class="tool-tag">${tg}</span>`).join('')}</div>
            <div class="tool-footer">
                <div class="tool-rating">${getStars(t.rating)}<span>${t.rating}/10</span></div>
                <a href="${t.link}" target="_blank" class="tool-link" onclick="event.stopPropagation()">访问 →</a>
            </div>
        </div>
    </div>`;
}

function renderAll(){
    const filtered=tools.filter(t=>{
        if(activeRegion==='cn'&&t.vpn)return false;
        if(activeRegion==='intl'&&!t.vpn)return false;
        if(activeCategory!=='all'&&t.cat!==activeCategory)return false;
        const q=searchQuery.toLowerCase();
        if(q&&!t.name.toLowerCase().includes(q)&&!t.vendor.toLowerCase().includes(q)&&!t.desc.toLowerCase().includes(q)&&!t.tags.some(tg=>tg.toLowerCase().includes(q)))return false;
        return true;
    });

    toolCount.textContent=filtered.length;
    cnCount.textContent=filtered.filter(t=>!t.vpn).length;
    intlCount.textContent=filtered.filter(t=>t.vpn).length;

    if(!filtered.length){container.innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>没有找到匹配的工具，试试换个关键词或筛选条件？</p></div>';return;}

    if(activeCategory==='all'){
        const g={};
        filtered.forEach(t=>{if(!g[t.cat])g[t.cat]=[];g[t.cat].push(t);});
        let h='';
        for(const[c,cts]of Object.entries(g)){
            const info=catMap[c];
            h+=`<section class="category-section"><h2 class="category-title"><span class="category-icon">${info.icon}</span>${info.name}<span style="font-size:.7rem;color:var(--text-secondary);font-weight:400;margin-left:4px;">(${cts.length})</span></h2><div class="tools-grid">${cts.map(renderCard).join('')}</div></section>`;
        }
        container.innerHTML=h;
    }else{
        const info=catMap[activeCategory];
        container.innerHTML=`<section class="category-section"><h2 class="category-title"><span class="category-icon">${info.icon}</span>${info.name}<span style="font-size:.7rem;color:var(--text-secondary);font-weight:400;margin-left:4px;">(${filtered.length})</span></h2><div class="tools-grid">${filtered.map(renderCard).join('')}</div></section>`;
    }
}

function openPreview(url){document.getElementById('modalImage').src=url;document.getElementById('previewModal').classList.add('active');}
function closeModal(){document.getElementById('previewModal').classList.remove('active');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

searchInput.addEventListener('input',e=>{searchQuery=e.target.value.trim();renderAll();});
regionTags.forEach(t=>{t.addEventListener('click',()=>{regionTags.forEach(x=>x.classList.remove('active'));t.classList.add('active');activeRegion=t.dataset.region;renderAll();});});
filterTags.forEach(t=>{t.addEventListener('click',()=>{filterTags.forEach(x=>x.classList.remove('active'));t.classList.add('active');activeCategory=t.dataset.category;renderAll();});});

renderAll();
</script>
