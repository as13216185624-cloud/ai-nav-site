<title>九万AI - AI作品精选 · 工具导航</title>
<style>
:root{
--bg:#060606;--card-bg:#0e0d0b;--card-hover:#161412;--sidebar-bg:#090909;
--text:#e6ddd0;--text-secondary:#8a8070;--accent:#c9a84c;--accent-cyber:#00e5c0;
--accent-glow:rgba(201,168,76,.18);--cyber-glow:rgba(0,229,192,.15);--border:#1f1b14;
--tag-bg:#12100c;--gradient:linear-gradient(135deg,#c9a84c,#e8c547);
--cyber-gradient:linear-gradient(135deg,#00e5c0,#00b8a0);
--free:#00b894;--paid:#c9a84c;--vpn:#e85d5d;--cn:#00b894;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Noto Serif SC',serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,229,192,.03) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* Sidebar */
.sidebar{width:220px;min-width:220px;height:100vh;position:fixed;left:0;top:0;background:var(--sidebar-bg);border-right:1px solid var(--border);z-index:100;overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-logo{padding:16px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.sidebar-logo img{width:36px;height:36px;border-radius:8px;}
.sidebar-logo span{font-size:1.1rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;}
.sidebar-nav{flex:1;padding:12px 0;}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text-secondary);text-decoration:none;font-size:.84rem;transition:all .2s;border-left:3px solid transparent;}
.sidebar-nav a:hover{color:var(--text);background:rgba(201,168,76,.06);}
.sidebar-nav a.active{color:var(--accent);background:rgba(201,168,76,.1);border-left-color:var(--accent);}
.sidebar-nav a .nav-icon{font-size:1.1rem;width:20px;text-align:center;flex-shrink:0;}
.sidebar-nav a .nav-count{font-size:.68rem;color:var(--text-secondary);margin-left:auto;}
.sidebar-nav .nav-section{font-size:.68rem;color:var(--text-secondary);padding:16px 20px 6px;text-transform:uppercase;letter-spacing:2px;opacity:.5;}

/* Main */
.main-wrap{flex:1;margin-left:220px;position:relative;z-index:1;min-height:100vh;}
.top-bar{position:sticky;top:0;z-index:99;background:rgba(6,6,6,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;}
.top-bar-inner{max-width:1200px;margin:0 auto;}
.search-row{display:flex;gap:12px;align-items:center;margin-bottom:12px;}
.search-box{flex:1;position:relative;}
.search-box input{width:100%;padding:12px 16px 12px 44px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.9rem;outline:none;transition:all .2s;}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.search-box .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1.1rem;}
.search-sources{display:flex;gap:6px;}
.search-source{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;font-size:.75rem;transition:all .2s;white-space:nowrap;}
.search-source:hover,.search-source.active{border-color:var(--accent-cyber);color:var(--accent-cyber);}
.feature-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:0;}
.feature-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s;text-decoration:none;}
.feature-card:hover{border-color:rgba(201,168,76,.3);background:var(--card-hover);}
.feature-card .fc-icon{font-size:1.5rem;flex-shrink:0;}
.feature-card .fc-info{min-width:0;}
.feature-card .fc-title{font-size:.82rem;font-weight:700;color:var(--text);}
.feature-card .fc-sub{font-size:.68rem;color:var(--text-secondary);}

/* Main content */
.main-content{max-width:1200px;margin:0 auto;padding:24px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:1.2rem;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);margin-left:12px;}
.section-tabs{display:flex;gap:6px;}
.section-tab{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;font-size:.78rem;transition:all .2s;}
.section-tab:hover,.section-tab.active{border-color:var(--accent-cyber);color:var(--accent-cyber);}
.section-tab.active{background:rgba(0,229,192,.1);}

/* Hero showcase */
.hero-showcase{position:relative;border-radius:14px;overflow:hidden;margin-bottom:32px;background:#000;border:1px solid var(--border);}
.hero-slider{position:relative;height:420px;}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity .6s;display:flex;align-items:center;justify-content:center;background:#000;}
.hero-slide.active{opacity:1;}
.hero-slide img{width:100%;height:100%;object-fit:cover;}
.hero-slide .hero-overlay{position:absolute;bottom:0;left:0;right:0;padding:40px 32px 28px;background:linear-gradient(transparent,rgba(0,0,0,.9));}
.hero-slide .hero-title{font-size:1.8rem;font-weight:800;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.8);}
.hero-slide .hero-meta{display:flex;gap:16px;align-items:center;margin-top:6px;font-size:.82rem;color:rgba(255,255,255,.75);}
.hero-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.2rem;z-index:3;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.hero-nav:hover{background:rgba(201,168,76,.5);}
.hero-nav.prev{left:12px;}
.hero-nav.next{right:12px;}
.hero-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:3;}
.hero-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .2s;}
.hero-dot.active{background:var(--accent);box-shadow:0 0 8px var(--accent);}

/* Showcase grid */
.showcase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:40px;}
.showcase-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .3s;position:relative;}
.showcase-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .3s;z-index:1;}
.showcase-card:hover{border-color:rgba(201,168,76,.3);background:var(--card-hover);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.5);}
.showcase-card:hover::before{opacity:1;}
.showcase-card .sc-preview{width:100%;height:200px;overflow:hidden;position:relative;background:#040404;}
.showcase-card .sc-preview img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.showcase-card:hover .sc-preview img{transform:scale(1.06);}
.showcase-card .sc-body{padding:14px 16px;}
.showcase-card .sc-title{font-size:.92rem;font-weight:700;color:var(--text);}
.showcase-card .sc-meta{font-size:.72rem;color:var(--text-secondary);margin-top:4px;display:flex;align-items:center;gap:8px;}
.showcase-card .sc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.showcase-card .sc-tag{font-size:.62rem;padding:2px 8px;background:var(--tag-bg);border:1px solid var(--border);border-radius:4px;color:var(--text-secondary);}
.showcase-card .sc-likes{display:flex;align-items:center;gap:3px;font-size:.7rem;color:var(--text-secondary);position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);padding:3px 8px;border-radius:10px;z-index:2;}

/* Tool section */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.tool-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .3s;position:relative;}
.tool-card:hover{border-color:rgba(201,168,76,.3);background:var(--card-hover);transform:translateY(-1px);}
.tool-card .tc-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tool-card .tc-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(0,229,192,.1));display:flex;align-items:center;justify-content:center;font-size:.9rem;border:1px solid rgba(201,168,76,.15);flex-shrink:0;}
.tool-card .tc-name{font-size:.9rem;font-weight:700;color:var(--text);}
.tool-card .tc-vendor{font-size:.7rem;color:var(--text-secondary);}
.tool-card .tc-desc{font-size:.75rem;color:var(--text-secondary);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tool-card .tc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.tool-card .tc-tag{font-size:.62rem;padding:2px 7px;background:var(--tag-bg);border-radius:3px;color:var(--text-secondary);border:1px solid var(--border);}
.tool-card .tc-footer{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border);}
.tool-card .tc-rating{font-size:.72rem;color:var(--text-secondary);}
.tool-card .tc-link{padding:4px 10px;background:var(--card-bg);color:var(--accent);border:1px solid rgba(201,168,76,.25);border-radius:5px;text-decoration:none;font-size:.72rem;transition:all .2s;}
.tool-card .tc-link:hover{background:var(--accent);color:#000;}
.tool-card .tc-badges{display:flex;gap:4px;position:absolute;top:10px;right:10px;}
.badge-vpn{background:rgba(232,93,93,.85);color:#fff;font-size:.6rem;padding:2px 6px;border-radius:3px;font-weight:600;}
.badge-cn{background:rgba(0,184,148,.85);color:#000;font-size:.6rem;padding:2px 6px;border-radius:3px;font-weight:600;}
.badge-free{background:rgba(0,184,148,.85);color:#000;font-size:.6rem;padding:2px 6px;border-radius:3px;font-weight:600;}
.badge-paid{background:rgba(201,168,76,.85);color:#000;font-size:.6rem;padding:2px 6px;border-radius:3px;font-weight:600;}
.badge-freemium{background:rgba(0,229,192,.85);color:#000;font-size:.6rem;padding:2px 6px;border-radius:3px;font-weight:600;}

/* Detail modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;max-width:900px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}
.modal-close{position:sticky;top:0;right:0;float:right;background:rgba(0,0,0,.6);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.2rem;z-index:10;margin:12px;transition:all .2s;}
.modal-close:hover{background:rgba(201,168,76,.6);}
.modal-img{width:100%;max-height:500px;object-fit:contain;background:#000;}
.modal-body{padding:24px;}
.modal-body .md-title{font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:4px;}
.modal-body .md-author{font-size:.82rem;color:var(--accent-cyber);margin-bottom:12px;}
.modal-body .md-section{margin-bottom:16px;}
.modal-body .md-label{font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.modal-body .md-prompt{background:#040404;border:1px solid var(--border);border-radius:8px;padding:14px;font-size:.82rem;color:var(--text);line-height:1.6;font-family:monospace;white-space:pre-wrap;word-break:break-all;}
.modal-body .md-tags{display:flex;gap:6px;flex-wrap:wrap;}
.modal-body .md-tag{padding:4px 12px;background:var(--tag-bg);border:1px solid var(--border);border-radius:14px;font-size:.75rem;color:var(--accent-cyber);}
.modal-body .md-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.md-btn{padding:10px 20px;border-radius:10px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;}
.md-btn.primary{background:var(--gradient);color:#000;}
.md-btn.primary:hover{box-shadow:0 0 20px var(--accent-glow);}
.md-btn.secondary{background:var(--card-bg);color:var(--accent);border:1px solid rgba(201,168,76,.3);}
.md-btn.secondary:hover{border-color:var(--accent);}

/* Footer */
.footer{text-align:center;padding:32px 20px;border-top:1px solid var(--border);color:var(--text-secondary);font-size:.75rem;margin-top:40px;}
.footer a{color:var(--accent);text-decoration:none;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

@media(max-width:768px){
  .sidebar{width:60px;min-width:60px;}
  .sidebar-logo span,.sidebar-nav a span:not(.nav-icon),.sidebar-nav .nav-section,.sidebar-nav .nav-count{display:none;}
  .sidebar-logo{justify-content:center;padding:12px;}
  .sidebar-nav a{justify-content:center;padding:12px;}
  .main-wrap{margin-left:60px;}
  .feature-cards{grid-template-columns:repeat(2,1fr);}
  .hero-slider{height:250px;}
  .showcase-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
  .tools-grid{grid-template-columns:1fr;}
  .search-sources{display:none;}
}
</style>
</head>

let currentPage='showcase',currentCat='all',searchQuery='';

function getPriceBadge(pt){
  if(pt==='free')return'<span class="badge-free">免费</span>';
  if(pt==='paid')return'<span class="badge-paid">付费</span>';
  return'<span class="badge-freemium">免费+付费</span>';
}

function showDetail(item){
  document.getElementById('modalImg').src=item.image;
  document.getElementById('modalBody').innerHTML=`
    <div class="md-title">${item.title}</div>
    <div class="md-author">👤 ${item.author} · 🛠️ ${item.tool} · ❤️ ${item.likes.toLocaleString()}</div>
    <div class="md-section"><div class="md-label">提示词 / Prompt</div><div class="md-prompt">${item.prompt}</div></div>
    <div class="md-section"><div class="md-label">标签</div><div class="md-tags">${item.tags.map(t=>`<span class="md-tag">#${t}</span>`).join('')}</div></div>
    <div class="md-actions">
      <button class="md-btn primary" onclick="copyPrompt('${item.prompt.replace(/'/g,"\\'")}')">📋 复制提示词</button>
      <button class="md-btn secondary" onclick="closeDetail()">关闭</button>
    </div>`;
  document.getElementById('detailModal').classList.add('active');
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('detailModal').classList.remove('active');
  document.body.style.overflow='';
}

function copyPrompt(text){
  navigator.clipboard.writeText(text).then(()=>{
    const btn=event.target;
    btn.textContent='✅ 已复制';
    setTimeout(()=>btn.textContent='📋 复制提示词',2000);
  });
}

let heroTimer,heroIndex=0;
function startHeroSlider(){
  const slides=document.querySelectorAll('.hero-slide');
  const dots=document.querySelectorAll('.hero-dot');
  if(!slides.length)return;
  function go(i){
    slides.forEach(s=>s.classList.remove('active'));
    dots.forEach(d=>d.classList.remove('active'));
    slides[i].classList.add('active');
    dots[i].classList.add('active');
    heroIndex=i;
  }
  document.querySelector('.hero-nav.prev').onclick=()=>go((heroIndex-1+slides.length)%slides.length);
  document.querySelector('.hero-nav.next').onclick=()=>go((heroIndex+1)%slides.length);
  dots.forEach((d,i)=>d.onclick=()=>go(i));
  go(0);
  clearInterval(heroTimer);
  heroTimer=setInterval(()=>go((heroIndex+1)%slides.length),5000);
}

          <div class="hero-overlay"><div class="hero-title">${s.title}</div><div class="hero-meta"><span>👤 ${s.author}</span><span>🛠️ ${s.tool}</span><span>❤️ ${s.likes.toLocaleString()}</span></div></div>

function renderTools(){
  let filtered=tools;
  if(currentCat!=='all')filtered=filtered.filter(t=>t.cat===currentCat);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    filtered=filtered.filter(t=>t.name.toLowerCase().includes(q)||t.vendor.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||t.tags.some(tg=>tg.toLowerCase().includes(q)));
  }
  const catName={llm:'大语言模型',image:'图片生成',video:'视频生成',audio:'音频音乐',code:'编程开发',design:'设计创作',productivity:'办公效率',avatar:'数字人',search:'AI搜索',edu:'教育学习',agent:'Agent/自动化','3d':'3D生成'};
  if(currentCat==='all'){
    let groups={};
    filtered.forEach(t=>{if(!groups[t.cat])groups[t.cat]=[];groups[t.cat].push(t);});
    return Object.entries(groups).map(([cat,items])=>`
      <section style="margin-bottom:32px;">
        <div class="section-header"><h2 class="section-title">${catName[cat]||cat} <span style="font-size:.7rem;color:var(--text-secondary);font-weight:400;margin-left:4px;">(${items.length})</span></h2></div>
        <div class="tools-grid">${items.map(renderToolCard).join('')}</div>
      </section>`).join('');
  }
  return`<div class="section-header"><h2 class="section-title">${catName[currentCat]} <span style="font-size:.7rem;color:var(--text-secondary);font-weight:400;margin-left:4px;">(${filtered.length})</span></h2></div><div class="tools-grid">${filtered.map(renderToolCard).join('')}</div>`;
}

function renderToolCard(t){
  const vpnBadge=t.vpn?'<span class="badge-vpn">🔒 科学上网</span>':'<span class="badge-cn">🇨🇳 国内直连</span>';
  const stars='⭐'.repeat(Math.floor(t.rating/2));
  return`<div class="tool-card" onclick="window.open('${t.link}','_blank')">
    <div class="tc-badges">${vpnBadge}${getPriceBadge(t.pt)}</div>
    <div class="tc-header"><div class="tc-icon">${t.icon}</div><div><div class="tc-name">${t.name}</div><div class="tc-vendor">${t.vendor}</div></div></div>
    <div class="tc-desc">${t.desc}</div>
    <div class="tc-tags">${t.tags.map(tg=>`<span class="tc-tag">${tg}</span>`).join('')}</div>
    <div class="tc-footer"><span class="tc-rating">${stars} ${t.rating}/10</span><a href="${t.link}" target="_blank" class="tc-link" onclick="event.stopPropagation()">访问 →</a></div>
  </div>`;
}

  <script>
    fetch('news.json').then(r=>r.json()).then(news=>{
      const html='<div class="showcase-grid">'+news.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20).map(n=>'<div class="showcase-card" onclick="showNewsDetail(\\''+n.title.replace(/'/g,"\\\\'")+'\\',\\''+(n.source_url||'').replace(/'/g,"\\\\'")+'\\',\\''+(n.summary||n.content||'').replace(/'/g,"\\\\'").substring(0,200)+'\\')"><div class="sc-preview" style="height:120px;display:flex;align-items:center;justify-content:center;font-size:2rem;">📰</div><div class="sc-body"><div class="sc-title" style="font-size:.85rem;">'+n.title+'</div><div class="sc-meta">'+n.date+'</div></div></div>').join('')+'</div>';
      document.getElementById('newsContent').innerHTML=html;
    }).catch(()=>{document.getElementById('newsContent').innerHTML='<p>暂无新闻数据</p>';});
  <\\/script>`;
}

function showNewsDetail(title,url,summary){
  document.getElementById('modalImg').style.display='none';
  document.getElementById('modalBody').innerHTML=`
    <div class="md-title">${title}</div>
    <div class="md-section"><div class="md-prompt">${summary||'暂无摘要'}</div></div>
    <div class="md-actions">
      ${url?`<a href="${url}" target="_blank" class="md-btn primary">🔗 阅读原文</a>`:''}
      <button class="md-btn secondary" onclick="closeDetail()">关闭</button>
    </div>`;
  document.getElementById('detailModal').classList.add('active');
}

function switchPage(page){
  currentPage=page;
  if(page==='tools')currentCat='all';
  document.querySelectorAll('.sidebar-nav a[data-page]').forEach(a=>a.classList.toggle('active',a.dataset.page===page));
  document.querySelectorAll('.sidebar-nav a[data-cat]').forEach(a=>a.classList.remove('active'));
  updateContent();
}

function updateContent(){
  const mc=document.getElementById('mainContent');
  if(currentPage==='showcase'){mc.innerHTML=renderShowcase();setTimeout(startHeroSlider,100);}
  else if(currentPage==='tools')mc.innerHTML=renderTools();
  else if(currentPage==='news')mc.innerHTML=renderNews();
}

// Event listeners
document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value.trim();updateContent();});
document.querySelectorAll('.sidebar-nav a[data-cat]').forEach(a=>{a.addEventListener('click',e=>{e.preventDefault();currentPage='tools';currentCat=a.dataset.cat;document.querySelectorAll('.sidebar-nav a').forEach(x=>x.classList.remove('active'));a.classList.add('active');updateContent();});});
document.querySelectorAll('.sidebar-nav a[data-page]').forEach(a=>{a.addEventListener('click',e=>{e.preventDefault();switchPage(a.dataset.page);});});
document.querySelectorAll('.section-tab').forEach(t=>{t.addEventListener('click',function(){this.parentElement.querySelectorAll('.section-tab').forEach(x=>x.classList.remove('active'));this.classList.add('active');});});

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});

// Init
updateContent();
</script>
</body>
</html>
